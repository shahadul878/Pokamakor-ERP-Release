name: Mirror Release Assets (No Source Code)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      source_tag:
        description: "Source tag from shahadul878/Pokamakor-ERP (e.g. v1.0.3)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve source tag
        id: vars
        run: |
          if [ -n "${{ github.event.inputs.source_tag }}" ]; then
            echo "tag=${{ github.event.inputs.source_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download EXE/DMG from source repo release
        env:
          # Use a PAT from release repo secrets if source repo is private.
          # Create secret: SOURCE_REPO_TOKEN (repo read access).
          GH_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN || github.token }}
        run: |
          rm -rf artifacts
          mkdir -p artifacts
          gh release download "${{ steps.vars.outputs.tag }}" \
            --repo "shahadul878/Pokamakor-ERP" \
            --pattern "*.exe" \
            --pattern "*.dmg" \
            --dir artifacts
          ls -al artifacts

      - name: Upload binaries to this repo release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
          fail_on_unmatched_files: true

